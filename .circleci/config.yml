version: 2.1

meta:
  xcode-versions: &xcode-versions
      matrix:
        parameters:
          xcode-version: ["26.1", "26.2", "26.3"]

jobs:
  build_and_test:
    parameters:
      xcode-version:
        type: string
        default: "26.3"
    macos:
      xcode: << parameters.xcode-version >>
    resource_class: m4pro.medium
    environment:
      XCODE_VERSION: << parameters.xcode-version >>
    steps:
      - checkout
      - run: xcodebuild -version      
      - run:
          name: Build and Test
          command: |
            fastlane scan \
              --package_path "." \
              --scheme "DoximityDialerSDK" \
              --device "iPhone 17" \
              --clean --result_bundle true --output-types "junit"
      - run:
          name: Generate Test Results
          command: |
            fastlane trainer --path "test_output" --output_directory "test_results"
      - store_test_results:
          path: test_results

workflows:
  main:
    jobs:
      - build_and_test:
          <<: *xcode-versions
